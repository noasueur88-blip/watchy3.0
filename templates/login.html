<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0f0f0f;
    font-family: Arial, sans-serif;
    color: white;
}

/* Card */
.box {
    background: #1a1a1a;
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
    text-align: center;
}

/* Title */
h2 {
    margin-bottom: 20px;
    color: #ffffff;
}

/* Input */
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: none;
    border-radius: 6px;
    background: #2a2a2a;
    color: white;
    outline: none;
}

/* Button */
button {
    width: 100%;
    padding: 10px;
    background: #4CAF50;
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #45a049;
}

/* small text */
p {
    font-size: 12px;
    color: #aaa;
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="box">

    <h2>🔐 Admin Login</h2>

    <form method="POST">
        <input type="password" name="password" placeholder="Mot de passe" required>
        <button type="submit">Se connecter</button>
    </form>

    <p>Accès réservé administrateur</p>

</div>

</body>
</html>
