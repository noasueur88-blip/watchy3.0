<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1a1a1a, #0f0f0f);
    font-family: Arial, sans-serif;
    color: white;
}

/* Card */
.box {
    background: rgba(26, 26, 26, 0.9);
    padding: 35px;
    border-radius: 14px;
    width: 340px;
    box-shadow: 0 0 25px rgba(0,0,0,0.7);
    text-align: center;
    backdrop-filter: blur(8px);
}

/* Title */
h2 {
    margin-bottom: 20px;
    color: #ffffff;
}

/* Discord button */
.discord-btn {
    width: 100%;
    padding: 12px;
    background: #5865F2;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    transition: 0.2s;
    font-weight: bold;
    text-decoration: none;
    display: inline-block;
}

.discord-btn:hover {
    background: #4752C4;
    transform: scale(1.02);
}

/* footer text */
p {
    font-size: 12px;
    color: #aaa;
    margin-top: 15px;
}
</style>

</head>

<body>

<div class="box">

    <h2>🔐 Admin Login</h2>

    <!-- DISCORD OAUTH LOGIN -->
    <a href="/login/discord" class="discord-btn">
        Se connecter avec Discord
    </a>

    <p>Accès réservé aux administrateurs</p>

</div>

</body>
</html>
