<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1a1a1a, #0f0f0f);
    font-family: Arial, sans-serif;
    color: white;
}

/* Card */
.box {
    background: rgba(26, 26, 26, 0.9);
    padding: 35px;
    border-radius: 14px;
    width: 340px;
    box-shadow: 0 0 25px rgba(0,0,0,0.7);
    text-align: center;
    backdrop-filter: blur(8px);
}

/* Title */
h2 {
    margin-bottom: 20px;
    color: #ffffff;
}

/* Input */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    background: #2a2a2a;
    color: white;
    outline: none;
    transition: 0.2s;
}

input:focus {
    background: #333;
    box-shadow: 0 0 10px rgba(76, 175, 80, 0.4);
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background: #4CAF50;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    transition: 0.2s;
    font-weight: bold;
}

button:hover {
    background: #45a049;
    transform: scale(1.02);
}

/* message */
.msg {
    margin-top: 10px;
    font-size: 13px;
    color: #ff4d4d;
}

/* footer text */
p {
    font-size: 12px;
    color: #aaa;
    margin-top: 15px;
}
</style>

</head>

<body>

<div class="box">

    <h2>🔐 Admin Login</h2>

    <form method="POST">
        <input type="password" name="password" placeholder="Mot de passe admin" required autofocus>
        <button type="submit">Se connecter</button>
    </form>

    <!-- ERROR MESSAGE FLASK -->
    {% if error %}
        <div class="msg">{{ error }}</div>
    {% endif %}

    <p>Accès sécurisé administrateur</p>

</div>

</body>
</html>
