<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Codes</title>
</head>
<body>

<h2>Créer un code</h2>

<form method="POST">
    Mot de passe: <input type="password" name="password"><br><br>

    Rôle:
    <select name="role">
        {% for role in roles %}
        <option value="{{ role[0] }}">{{ role[1] }}</option>
        {% endfor %}
    </select><br><br>

    Type:
    <select name="type">
        <option value="unique">Unique</option>
        <option value="vip">VIP</option>
    </select><br><br>

    Durée (jours, 0 = lifetime):
    <input type="number" name="days" value="0"><br><br>

    User ID (optionnel):
    <input type="text" name="user"><br><br>

    <button type="submit">Créer</button>
</form>

</body>
</html>
